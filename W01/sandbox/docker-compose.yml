# W1 沙箱：Linux 桌面 + 浏览器可视化（LinuxServer Webtop，2025-06 起基于 Selkies）
# 用法：放进 cua-camp/sandbox/ 文件夹（一个容器一个独立文件夹），在该文件夹执行  docker compose up -d
# 浏览器打开 https://localhost:3001，首次自签证书点「高级 → 继续前往 localhost」
services:
  sandbox:
    image: lscr.io/linuxserver/webtop:ubuntu-xfce   # 版本以官方最新为准
    container_name: cua-sandbox
    security_opt:
      - seccomp:unconfined          # 桌面应用需要放开 seccomp，否则部分 GUI 操作失败；隔离边界仍在 Docker 层
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
      - PIXELFLUX_WAYLAND=false     # 强制 X11：pyautogui 注入鼠标键盘靠它（Selkies 默认 Wayland 会打不动），W3/W4 自动化全依赖这行，别删
    ports:
      - "3001:3001"                 # 浏览器访问（https，推荐）：https://localhost:3001
      - "3000:3000"                 # http 备用
    volumes:
      - ./sandbox-data:/config      # 桌面数据持久化到本地文件夹
    shm_size: "1gb"                 # 给浏览器/桌面用的共享内存，太小浏览器会崩
    restart: unless-stopped
