# 可选：用 ssh 连一个本地容器，完整练一遍 ssh
# （日常拿沙箱 shell 用 docker exec -it cua-sandbox bash 就够；这个只是为了练手 ssh）
# 用法：docker compose -f ssh-lab.yml up -d  然后  ssh -p 2222 student@localhost
# 环境变量名/端口以 linuxserver/openssh-server 官方文档当前版本为准，先本机跑通再用
services:
  ssh-lab:
    image: lscr.io/linuxserver/openssh-server:latest
    container_name: ssh-lab
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
      - PUBLIC_KEY_FILE=/keys/id_ed25519.pub   # 把你的公钥挂进来
      - USER_NAME=student
    volumes:
      - ~/.ssh/id_ed25519.pub:/keys/id_ed25519.pub:ro
    ports:
      - "2222:2222"
